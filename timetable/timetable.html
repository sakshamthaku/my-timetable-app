<!DOCTYPE html>
<a href="index.html">
← Back to Dashboard
</a>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Timetable</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white}
header{display:flex;justify-content:space-between;padding:15px;background:#111}
.top-buttons button{margin-left:6px;padding:8px;border-radius:8px;border:none;cursor:pointer}

.container{max-width:900px;margin:auto;padding:20px}
input,select{padding:10px;border-radius:8px;border:none;margin:5px 0}

table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{border:1px solid #333;padding:8px;text-align:center}

.remove-btn{background:red;color:white;border:none;border-radius:5px}

.popup{
position:fixed;top:20%;left:50%;transform:translateX(-50%);
background:#222;padding:20px;border-radius:10px;display:none;width:300px
}

/* FLOATING COLOR PICKER */
#fontColorPicker{
position:fixed;
bottom:20px;
right:20px;
background:#222;
padding:10px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<header>
<h2>📅 Timetable</h2>

<div class="top-buttons">
<button onclick="openPopup('settingsBox')">⚙️</button>
<button onclick="openPopup('calcBox')">🧮</button>
<button onclick="openPopup('timeBox')">🕒</button>
<button onclick="downloadPNG()">🖼</button>
<button onclick="downloadPDF()">📄</button>
</div>
</header>

<div class="container">

<input id="subject" placeholder="Subject">

<select id="day">
<option>Monday</option><option>Tuesday</option><option>Wednesday</option>
<option>Thursday</option><option>Friday</option>
<option>Saturday</option><option>Sunday</option>
</select>

<label>Time</label>
<input type="time" id="timeInput">

<label>Date</label>
<input type="date" id="dateInput">

<button onclick="add()">Add</button>

<div id="downloadArea">
<table id="table">
<tr>
<th>Day</th><th>work</th><th>Time</th><th>Date</th><th>Remove</th>
</tr>
</table>
</div>

</div>

<!-- SETTINGS -->
<div id="settingsBox" class="popup">
<h3>⚙️ Settings</h3>
<input type="color" onchange="document.body.style.background=this.value">
<br><br>
<button onclick="closeAll()">Close</button>
</div>

<!-- CALCULATOR -->
<div id="calcBox" class="popup">
<h3>🧮 Calculator</h3>
<input id="calcInput"><br><br>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button onclick="press('+')">+</button><br>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button onclick="press('-')">-</button><br>

<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button onclick="press('*')">*</button><br>

<button onclick="press('0')">0</button>
<button onclick="calculate()">=</button>
<button onclick="clearCalc()">C</button>

<br><br>
<button onclick="closeAll()">Close</button>
</div>

<!-- TIME -->
<div id="timeBox" class="popup">
<h3>🕒 Time</h3>
<p id="timeDisplay">Loading...</p>
<button onclick="closeAll()">Close</button>
</div>



<!-- FONT COLOR PICKER -->
<div id="fontColorPicker">
<label style="font-size:12px">Font 🎨</label><br>
<input type="color" onchange="changeFontColor(this.value)">
</div>

<script>

/* FONT COLOR */
function changeFontColor(color){
document.body.style.color = color;
document.querySelectorAll("table, th, td").forEach(el=>{
el.style.color = color;
});
}

/* ADD */
function add(){
let subject = document.getElementById("subject").value;
let day = document.getElementById("day").value;
let time = document.getElementById("timeInput").value;
let date = document.getElementById("dateInput").value;

if(!subject || !time || !date){
alert("Fill all fields");
return;
}

let table = document.getElementById("table");
let row = table.insertRow();

row.innerHTML = `
<td>${day}</td>
<td>${work}</td>
<td>${time}</td>
<td>${date}</td>
<td><button class="remove-btn" onclick="this.parentElement.parentElement.remove()">X</button></td>
`;
}

/* POPUP FIXED */
function openPopup(id){
document.querySelectorAll(".popup").forEach(p=>p.style.display="none");
let el = document.getElementById(id);
if(el){ el.style.display="block"; }
}

function closeAll(){
document.querySelectorAll(".popup").forEach(p=>p.style.display="none");
}

/* CALCULATOR FIX */
/* CALCULATOR FIX */
function press(v){
document.getElementById("calcInput").value += v;
}

function calculate(){
try{
let val=document.getElementById("calcInput").value;
document.getElementById("calcInput").value = eval(val);
}catch{
alert("Invalid Expression");
}
}

function clearCalc(){
document.getElementById("calcInput").value="";
}
/* TIME FIX */
setInterval(()=>{
let el=document.getElementById("timeDisplay");
if(el){
el.innerText=new Date().toLocaleTimeString();
}function press(v){
document.getElementById("calcInput").value += v;
}
},1000);

/* DOWNLOAD */
function downloadPNG(){
html2canvas(document.getElementById("downloadArea")).then(canvas=>{
let link=document.createElement("a");
link.download="timetable.png";
link.href=canvas.toDataURL();
link.click();
});
}

function downloadPDF(){
html2pdf().from(document.getElementById("downloadArea")).save("timetable.pdf");
}

</script>

</body>
</html>
