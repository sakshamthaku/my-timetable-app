<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f3f4f6;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      margin-top: 20px;
    }

    .btn {
      padding: 12px 20px;
      background: black;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      display: inline-block;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Dashboard</h1>
  <p>Welcome! Manage your timetable.</p>

  <div class="card">
    <!-- IMPORTANT: This opens your timetable file -->
    <a href="timetable.html" class="btn">
  Open Timetable
</a>
    
  </div>
</div>

</body>
</html>
